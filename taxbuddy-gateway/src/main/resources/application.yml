server:

  port: 8080

spring:

  application:

    name: taxbuddy-gateway

  cloud:

    gateway:

      discovery:

        locator:

          enabled: true

          lower-case-service-id: true

      routes:

        - id: user-service

          uri: lb://taxbuddy-user-service

          predicates:

            - Path=/api/users/**

          filters:

            - StripPrefix=1

        - id: tax-data-service

          uri: lb://taxbuddy-tax-data-service

          predicates:

            - Path=/api/tax/**

          filters:

            - StripPrefix=1

        - id: ai-chat-service

          uri: lb://taxbuddy-ai-chat-service

          predicates:

            - Path=/api/chat/**

          filters:

            - StripPrefix=1

        - id: session-service

          uri: lb://taxbuddy-session-service

          predicates:

            - Path=/api/sessions/**

          filters:

            - StripPrefix=1

        - id: escalation-service

          uri: lb://taxbuddy-escalation-service

          predicates:

            - Path=/api/escalation/**

          filters:

            - StripPrefix=1

        - id: expert-service

          uri: lb://taxbuddy-expert-service

          predicates:

            - Path=/api/experts/**

          filters:

            - StripPrefix=1

eureka:

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka/

    fetch-registry: true

    register-with-eureka: true

  instance:

    prefer-ip-address: true

management:

  endpoints:

    web:

      exposure:

        include: "*"

  endpoint:

    health:

      show-details: always
  gateway:
      enabled: true
