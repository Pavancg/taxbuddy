server:
  port: 8083

spring:
  application:
    name: taxbuddy-ai-chat-service

  autoconfigure:
    exclude:
      - org.springframework.ai.model.bedrock.cohere.autoconfigure.BedrockCohereEmbeddingAutoConfiguration
      - org.springframework.ai.model.bedrock.titan.autoconfigure.BedrockTitanEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration


  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: pavancg
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    bedrock:
      region: us-east-1   # ✅ FIXED (moved here)

      converse:
        chat:
          enabled: true
          options:
            model: arn:aws:bedrock:us-east-1:842609633492:inference-profile/global.anthropic.claude-haiku-4-5-20251001-v1:0
            max-tokens: 2048
            temperature: 0.7

      aws: # optional (credentials)
        access-key: --
        secret-key: --

    vectorstore:
      qdrant:
        initialize-schema: true
        host: localhost
        port: 6334
        collection-name: taxbuddy

    ollama:
      base-url: http://localhost:11434
      embedding:
        enabled: true
        options:
          model: nomic-embed-text

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

taxbuddy:
  services:
    tax-data-url: http://localhost:8082
logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.ai.bedrock.converse: DEBUG
    com.taxbuddy.chat: DEBUG
    software.amazon.awssdk.request: DEBUG