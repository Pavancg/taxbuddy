server:

  port: 8081

spring:

  application:

    name: taxbuddy-user-service

  datasource:

    url: jdbc:postgresql://localhost:5432/postgres

    username: postgres

    password: pavancg

    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:

      ddl-auto: update

    show-sql: true

    properties:

      hibernate:

        dialect: org.hibernate.dialect.PostgreSQLDialect

        format_sql: true

eureka:

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka/

    fetch-registry: true

    register-with-eureka: true

  instance:

    prefer-ip-address: true

management:

  endpoints:

    web:

      exposure:

        include: health,info

  endpoint:

    health:

      show-details: always

